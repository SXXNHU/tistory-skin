  📁 SECTION : <head> 태그
  📌 FILE    : src/html/01_head.html
  📋 DEPLOY  : skin.html 최상단 (DOCTYPE ~ </head>)
  📝 NOTES   : 메타태그, 폰트/아이콘 CDN, 외부 스크립트 링크,
               스킨 CSS 변수(:root), skinOptions 전역 변수 설정
============================================================ --><!DOCTYPE html>
<html class="scroll-smooth" id="hELLO" x-data="app" lang="ko">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="뭐든 잘하고 싶은 개발자의 풀스택 도전기">

    <title>[##_page_title_##] — [##_title_##]</title>
    <link rel="icon" href="https://apdui.tistory.com//favicon.ico">
    <link rel="shortcut icon" href="https://apdui.tistory.com//favicon.ico">
    <link rel="alternate" type="application/rss+xml" title="[##_title_##]" href="[##_rss_url_##]">
    <link rel="preconnect" href="//fonts.googleapis.com">
    <link rel="preconnect" href="//fonts.gstatic.com" crossorigin="">
    <link rel="stylesheet" :href='"//cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css"'>
    <link rel="stylesheet" :href='"//fonts.googleapis.com/css2?family=Source+Code+Pro:ital@0;1&display=swap"'>
    <link rel="stylesheet" :href='"//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"'>
    <link rel="stylesheet" :href="`//cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.7.0/build/styles/${dark ? skinOptions.hljsDark : skinOptions.hljs}.min.css`">
    <script src="./images/bootstrap.js"></script>
    <style>
      :root {
        --h-idx: 1100px;
        /* index */
        --h-pem: [##_var_width_##]px;
        /* permalink */
        --h-s: 256px;
        /* sidebar */
        --h-c: calc(100% - var(--h-s));
        /* content */
        --h-h: 256px;
        /* header */
      }
    </style>
    <script>
      /**
       * Set skin options
       *
       * @see https://tistory.github.io/document-tistory-skin/common/variable.html
       * @see docs/index.xml
       */
      window.skinOptions = {
        sidebar: '[##_var_sidebar_##]',
        foldableCategory: '[##_var_foldable-category_##]',
        width: '[##_var_width_##]',
        toc: '[##_var_toc_##]',
        scrollspy: '[##_var_scrollspy_##]',
        hljs: '[##_var_hljs_##]',
        hljsDark: '[##_var_hljs-dark_##]',
        headerStyle: '[##_var_header-style_##]'
      }
    </script>
    <script defer src="./images/app.d0c23866e762b0c8e2a7.js"></script>
    <script defer src="./images/vendor.d0c23866e762b0c8e2a7.js"></script>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./images/script.tV439QFBvQ4jG3lAjFc6.js"></script>
    <script defer src="./images/codeblock.js"></script>
  </head>
